<div class="intro{% if include.intro_class %} {{ include.intro_class }}{% endif %}">
  <div class="container">
    <div class="row justify-content-start">
      <div class="col-12 col-md-7 col-lg-6 order-2 order-md-1">
        {{ content }}
        {% if page.show_call_box %}
          {% include call.html show_button=true %}
        {% endif %}
      </div>
      {% if page.intro_image %}
      <div class="col-12 col-md-5 col-lg-6 order-1 order-md-2 position-relative">
        <div class="intro-image-wrap{% if page.intro_image_absolute %} intro-image-wrap-absolute{% endif %}{% if page.intro_image_hide_on_mobile %} intro-image-hide-mobile{% endif %}">
          {% assign intro_img_class = "intro-image" %}
          {% if page.intro_image_webp %}
          <picture>
            <source srcset="{{ page.intro_image_webp | relative_url }}" type="image/webp" />
            <img alt="{{ page.title }}" class="{{ intro_img_class }}" src="{{ page.intro_image | relative_url }}" width="{{ page.intro_image_width | default: 1024 }}" height="{{ page.intro_image_height | default: 1024 }}" />
          </picture>
          {% else %}
          <img alt="{{ page.title }}" class="{{ intro_img_class }}" src="{{ page.intro_image | relative_url }}" width="{{ page.intro_image_width | default: 1024 }}" height="{{ page.intro_image_height | default: 1024 }}" />
          {% endif %}
        </div>
      </div>
      {% endif %}
    </div>
  </div>
</div>
